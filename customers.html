<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Customers - Saltbox Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Admin navigation">
      <a class="brand" href="index.html" aria-label="Saltbox home"><span class="mark" aria-hidden="true"></span>Saltbox</a>
      <p class="preview-label">Admin</p>
      <nav aria-label="Admin pages">
        <ul class="nav-list">
          <li><a class="nav-item" data-page="dashboard" href="admin.html">Dashboard</a></li>
          <li><a class="nav-item" data-page="requests" href="requests.html">Requests</a></li>
          <li><a class="nav-item" data-page="tickets" href="tickets.html">Tickets</a></li>
          <li><a class="nav-item" data-page="customers" href="customers.html">Customers</a></li>
          <li><a class="nav-item" data-page="subscriptions" href="subscriptions.html">Subscriptions</a></li>
          <li><a class="nav-item" data-page="settings" href="settings.html">Settings</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer"><a class="back-link" href="index.html">Back to site</a></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><div class="page-kicker">Customers</div><h1>Customers</h1><p class="page-subtitle">Real customer accounts from Supabase.</p></div>
        <div class="top-actions">
          <label class="search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg><input id="customerSearch" type="search" placeholder="Search customers" aria-label="Search customers"></label>
          <span class="session-email" data-session-email></span>
          <button class="logout-btn" data-logout type="button">Log out</button>
        </div>
      </header>

      <article class="panel">
        <header class="panel-head">
          <div><h2 class="panel-title">Customer accounts</h2><p class="panel-subtitle" id="customerCount">Loading from Supabase</p></div>
          <button class="button-link primary" id="createCustomerToggle" type="button">Create customer</button>
        </header>
        <form class="form-panel" id="createCustomerForm" hidden>
          <div class="form-grid">
            <div class="field"><label for="newName">Customer name</label><input id="newName" name="name" type="text" autocomplete="name" required></div>
            <div class="field"><label for="newEmail">Email</label><input id="newEmail" name="email" type="email" autocomplete="email"></div>
            <div class="field"><label for="newBusiness">Business name</label><input id="newBusiness" name="business_name" type="text"></div>
            <div class="field"><label for="newStatus">Status</label><select id="newStatus" name="status"><option>Lead</option><option>Active</option><option>Past customer</option><option>Archived</option></select></div>
          </div>
          <div class="button-row" style="margin-top:16px;"><button class="button-link primary" type="submit">Save customer</button><button class="button-link" id="cancelCreateCustomer" type="button">Cancel</button></div>
          <p class="form-status" id="createCustomerStatus" role="status" aria-live="polite"></p>
        </form>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Business</th><th>Status</th><th>Created</th><th></th></tr></thead>
            <tbody id="customersBody"><tr class="table-state"><td colspan="6">Loading customers...</td></tr></tbody>
          </table>
        </div>
        <p class="empty" id="customersEmpty">No customers yet.</p>
      </article>
    </main>
  </div>

  <script type="module">
    import { bindTableSearch, createCustomer, formatDate, getCustomers, html, initAdminPage, setTableState } from "./admin.js";

    const admin = await initAdminPage("customers");
    const body = document.getElementById("customersBody");
    const empty = document.getElementById("customersEmpty");
    const count = document.getElementById("customerCount");
    const form = document.getElementById("createCustomerForm");
    const status = document.getElementById("createCustomerStatus");

    bindTableSearch(document.getElementById("customerSearch"), body, empty, "No customers yet.");

    document.getElementById("createCustomerToggle").addEventListener("click", () => {
      form.hidden = false;
      document.getElementById("newName").focus();
    });

    document.getElementById("cancelCreateCustomer").addEventListener("click", () => {
      form.hidden = true;
      status.textContent = "";
      form.reset();
    });

    function renderCustomers(rows) {
      count.textContent = `${rows.length} customer${rows.length === 1 ? "" : "s"}`;

      if (!rows.length) {
        body.innerHTML = "";
        empty.classList.add("visible");
        return;
      }

      empty.classList.remove("visible");
      body.innerHTML = rows.map((row) => {
        const href = `customer-detail.html?id=${encodeURIComponent(row.id)}`;
        return `
          <tr data-href="${href}" data-search-text="${html([row.name, row.email, row.business_name, row.status].join(" ").toLowerCase())}">
            <td class="entity"><a class="row-link" href="${href}">${html(row.name || "Unnamed")}</a></td>
            <td>${html(row.email || "-")}</td>
            <td>${html(row.business_name || "-")}</td>
            <td><span class="status ${row.status === "Active" ? "active" : "new"}">${html(row.status || "Lead")}</span></td>
            <td class="muted">${formatDate(row.created_at)}</td>
            <td><a class="row-link" href="${href}">Open</a></td>
          </tr>
        `;
      }).join("");
    }

    body.addEventListener("click", (event) => {
      if (event.target.closest("a")) return;
      const row = event.target.closest("tr[data-href]");
      if (row) window.location.href = row.dataset.href;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.textContent = "Creating customer...";
      status.className = "form-status";

      try {
        const fields = form.elements;
        const customer = await createCustomer({
          name: fields.name.value.trim(),
          email: fields.email.value.trim() || null,
          business_name: fields.business_name.value.trim() || null,
          status: fields.status.value,
          lead_source: "Manual",
        });
        window.location.href = `customer-detail.html?id=${encodeURIComponent(customer.id)}`;
      } catch (error) {
        status.textContent = error.message || "Could not create customer.";
        status.className = "form-status error";
      }
    });

    if (!admin.redirecting && admin.configError) {
      setTableState(body, admin.configError, true, 6);
      count.textContent = "Unavailable";
    } else if (!admin.redirecting) {
      try {
        renderCustomers(await getCustomers());
      } catch (error) {
        setTableState(body, error.message || "Could not load customers.", true, 6);
        count.textContent = "Supabase query failed";
      }
    }
  </script>
</body>
</html>
